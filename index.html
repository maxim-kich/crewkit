        this.renderQuestionnaireFill();
      }
    },

    renderMatrixFill() {
      const container = document.getElementById('artifact-fill-content');
      if (!container) return;

      const cols   = this.artifact.columns;
      const type   = this.artifact.type;
      const isScale = type === 'scale';

      // Ensure all rows have values objects
      this.artifact.groups.forEach((group) => {
        group.rows.forEach((row) => {
          if (!row.values) row.values = {};
        });
      });

      let html = `<div class="matrix-wrap" style="background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 16px; margin-top: 12px;">
      <table class="matrix-table"><thead><tr>`;
      html += `<th class="th-label-col"><div class="col-head" style="min-height:48px"></div></th>`;

      // Column headers
      cols.forEach((col) => {
        html += `<th><div class="col-head" style="align-items:center;justify-content:center;text-align:center;padding:10px 6px">
          <span style="font-weight:600;font-size:.8375rem;color:var(--color-text);display:block;text-align:center">${Utils.esc(col.label)}</span>
        </div></th>`;
      });

      // Right pole (scale type only)
      if (isScale) {
        html += `<th class="th-right-pole"><div class="col-head" style="min-height:48px"></div></th>`;
      }

      html += `</tr></thead><tbody>`;

      // Render groups and rows
      this.artifact.groups.forEach((group, gi) => {
        const groupColspan = cols.length + 1 + (isScale ? 1 : 0);

        // Group header row
        if (group.label && group.label.trim()) {
          html += `<tr class="group-header-row">
            <td class="group-cell" colspan="${groupColspan}">
              <div class="group-header-inner">
                <span class="group-label-input" style="cursor:default;font-weight:600;font-size:.9rem;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:0.05em">${Utils.esc(group.label)}</span>
              </div>
            </td>
          </tr>`;
        }

        // Skill rows
        group.rows.forEach((row, ri) => {
          html += `<tr class="skill-row">`;
          html += `<td class="row-label-cell">`;
          html += `<div class="row-label__name" style="font-weight:500;font-size:.8375rem;color:var(--color-text);padding:2px 0">${Utils.esc(row.label)}</div>`;
          if (row.description && row.description.trim()) {
            const descId = `desc-${gi}-${ri}`;
            html += `<button class="row-desc-toggle" onclick="Pages.taskFiller.toggleDesc('${descId}', this)">Show description</button>
                     <span class="row-desc-text" id="${descId}">${Utils.esc(row.description)}</span>`;
          }
          html += `</td>`;

          // Data cells
          cols.forEach((col, ci) => {
            const val = row.values[col.id];
            if (type === 'score') {
              const selectedIdx = this._getScoreIdx(row, cols);
              const filled = selectedIdx !== null && ci <= selectedIdx;
              html += `<td class="matrix-cell ${filled ? 'matrix-cell--filled-score' : ''} matrix-cell--readonly" onclick="Pages.taskFiller.onScoreClick(${gi}, ${ri}, ${ci})" style="cursor:pointer"></td>`;
            } else if (type === 'scale') {
              const colVal = parseInt(col.label);
              const rowVal = row.values['__scale'] ?? null;
              const isNeg = colVal < 0, isPos = colVal > 0;
              const filled = rowVal !== null && (
                isNeg ? colVal >= rowVal && rowVal < 0 :
                isPos ? colVal <= rowVal && rowVal > 0 : false
              );
              html += `<td class="matrix-cell ${isNeg ? 'matrix-cell--scale-neg' : 'matrix-cell--scale-pos'} ${filled ? 'matrix-cell--filled-score' : ''} matrix-cell--readonly" onclick="Pages.taskFiller.onScaleClick(${gi}, ${ri}, ${colVal})" style="cursor:pointer"></td>`;
            } else {
              html += `<td class="matrix-cell ${val === true ? 'matrix-cell--filled-selective' : ''} matrix-cell--readonly" onclick="Pages.taskFiller.onSelectiveClick(${gi}, ${ri}, '${col.id}')" style="cursor:pointer">
                <div class="matrix-cell__dot"></div>
              </td>`;
            }
          });

          // Right pole cell (scale type only)
          if (isScale) {
            html += `<td class="row-right-pole-cell">
              <div class="row-label__name" style="font-weight:500;font-size:.8375rem;color:var(--color-text);padding:2px 0">${Utils.esc(row.poleRight || '')}</div>
            </td>`;
          }

          html += `</tr>`;
        });
      });

      html += `</tbody></table>
      </div>`;
      container.innerHTML = html;
    },

    _getScoreIdx(row, cols) {
      let maxIdx = null;
      cols.forEach((col, ci) => { if (row.values[col.id]) maxIdx = ci; });
      return maxIdx;
    },

    onScoreClick(gi, ri, ci) {
      const row  = this.artifact.groups[gi].rows[ri];
      const cols = this.artifact.columns;
      const currentIdx = this._getScoreIdx(row, cols);
      cols.forEach(col => { row.values[col.id] = false; });
      if (currentIdx !== ci) {
        for (let i = 0; i <= ci; i++) row.values[cols[i].id] = true;
      }
      this.renderMatrixFill();
    },

    onScaleClick(gi, ri, colVal) {
      const row = this.artifact.groups[gi].rows[ri];
      row.values['__scale'] = row.values['__scale'] === colVal ? null : colVal;
      this.renderMatrixFill();
    },

    onSelectiveClick(gi, ri, colId) {
      const row = this.artifact.groups[gi].rows[ri];
      row.values[colId] = !row.values[colId];
      this.renderMatrixFill();
    },

    toggleDesc(descId, btn) {
      const descEl = document.getElementById(descId);
      if (!descEl) return;
      descEl.classList.toggle('show');
      btn.textContent = descEl.classList.contains('show') ? 'Hide description' : 'Show description';
    },

    renderQuestionnaireFill() {
      const container = document.getElementById('artifact-fill-content');
      if (!container) return;

      const { fields } = this.artifact;
      if (!this.artifact.responses) this.artifact.responses = {};

      let html = '<div class="q-view-fields-card">';

      const typeLabels = {
        text: 'Text',
        date: 'Date',
        select: 'Select',
        multiselect: 'Multi-select',
        rate: 'Rate'
      };

      fields.forEach((field) => {
        html += `<div class="q-view-field">`;
        html += `<div class="q-view-field__label-with-type">
          <label class="q-view-field__label">${Utils.esc(field.name)} <span class="q-view-field__type-badge">(${typeLabels[field.type] || field.type})</span></label>
        </div>`;

        const value = this.artifact.responses[field.id] || '';

        switch (field.type) {
          case 'text':
            html += `<textarea class="q-view-field__textarea" data-field-id="${field.id}" onchange="Pages.taskFiller.updateResponse('${field.id}', this.value)">${Utils.esc(value)}</textarea>`;
            break;
          case 'date':
            html += `<input type="date" class="q-view-field__input" data-field-id="${field.id}" value="${value}" onchange="Pages.taskFiller.updateResponse('${field.id}', this.value)">`;
            break;
          case 'select':
            html += `<div class="q-view-field__tags">`;
            (field.options || []).forEach(opt => {
              const isSelected = value === opt;
              html += `<button class="q-view-field__tag ${isSelected ? 'q-view-field__tag--selected' : ''}" onclick="event.preventDefault();Pages.taskFiller.updateResponse('${field.id}', '${Utils.esc(opt)}');event.target.closest('.q-view-field').querySelectorAll('.q-view-field__tag').forEach(t => t.classList.remove('q-view-field__tag--selected')); event.target.classList.add('q-view-field__tag--selected')" type="button">${Utils.esc(opt)}</button>`;
            });
            html += `</div>`;
            break;
          case 'multiselect':
            html += `<div class="q-view-field__tags">`;
            (field.options || []).forEach(opt => {
              const isSelected = Array.isArray(value) && value.includes(opt);
              html += `<button class="q-view-field__tag ${isSelected ? 'q-view-field__tag--selected' : ''}" onclick="event.preventDefault();Pages.taskFiller.toggleMultiselectTag('${field.id}', '${Utils.esc(opt)}')" type="button">${Utils.esc(opt)}</button>`;
            });
            html += `</div>`;
            break;
          case 'rate':
            const rateMax = field.rateMax || 5;
            const selectedValue = parseInt(value) || 0;
            html += `<div class="q-view-field__rate" data-field-id="${field.id}" data-rate-max="${rateMax}" data-rate-value="${selectedValue}">`;
            for (let i = 1; i <= rateMax; i++) {
              const isSelected = i <= selectedValue;
              html += `<button class="q-view-field__rate-btn ${isSelected ? 'q-view-field__rate-btn--selected' : ''}" data-rate-index="${i}" onmouseover="Pages.taskFiller.hoverRate(event)" onmouseout="Pages.taskFiller.unhoverRate(event)" onclick="event.preventDefault();Pages.taskFiller.updateRate('${field.id}', '${i}')" type="button">⭐</button>`;
            }
            html += `</div>`;
            break;
        }

        html += `</div>`;
      });

      html += '</div>';
      container.innerHTML = html;
    },

    updateResponse(fieldId, value) {
      this.artifact.responses[fieldId] = value;
    },

    updateRate(fieldId, value) {
      this.artifact.responses[fieldId] = value;
      // Update UI to show filled stars
      const container = document.querySelector(`[data-field-id="${fieldId}"]`);
      if (container) {
        const buttons = container.querySelectorAll('.q-view-field__rate-btn');
        buttons.forEach((btn, idx) => {
          btn.classList.toggle('q-view-field__rate-btn--selected', idx + 1 <= parseInt(value));
        });
        container.setAttribute('data-rate-value', value);
      }
    },

    hoverRate(e) {
      const btn = e.target.closest('.q-view-field__rate-btn');
      if (!btn) return;
      const container = btn.closest('.q-view-field__rate');
      const hoverIndex = parseInt(btn.getAttribute('data-rate-index'));
      const buttons = container.querySelectorAll('.q-view-field__rate-btn');
      buttons.forEach((b, idx) => {
        b.classList.toggle('q-view-field__rate-btn--selected', idx + 1 <= hoverIndex);
      });
    },

    unhoverRate(e) {
      const btn = e.target.closest('.q-view-field__rate-btn');
      if (!btn) return;
      const container = btn.closest('.q-view-field__rate');
      const actualValue = parseInt(container.getAttribute('data-rate-value'));
      const buttons = container.querySelectorAll('.q-view-field__rate-btn');
      buttons.forEach((b, idx) => {
        b.classList.toggle('q-view-field__rate-btn--selected', idx + 1 <= actualValue);
      });
    },

    toggleMultiselectTag(fieldId, option) {
      if (!this.artifact.responses[fieldId]) {
        this.artifact.responses[fieldId] = [];
      }
      let arr = this.artifact.responses[fieldId];
      if (!Array.isArray(arr)) arr = [];

      const idx = arr.indexOf(option);
      if (idx > -1) {
        arr.splice(idx, 1);
      } else {
        arr.push(option);
      }
      this.artifact.responses[fieldId] = arr;

      // Update UI
      const field = this.artifact.fields.find(f => f.id === fieldId);
      const container = document.querySelector(`[data-field-id="${fieldId}"]`)?.closest('.q-view-field') || event.target.closest('.q-view-field');
      if (container) {
        container.querySelectorAll('.q-view-field__tag').forEach((btn, i) => {
          const opt = field.options[i];
          btn.classList.toggle('q-view-field__tag--selected', arr.includes(opt));
        });
      }
    },

    downloadArtifact() {
      const blob = new Blob([JSON.stringify(this.artifact, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${(this.artifact.name || 'artifact').replace(/[^a-z0-9]/gi, '_').toLowerCase()}_filled.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      Toast.show('✅ Artifact downloaded.', 'success');

      // Redirect to dashboard after download
      setTimeout(() => {
        history.replaceState(null, '', 'index.html');
        this.artifact = null;
        Pages.dashboard.init();
      }, 600);
    },

    goBack() {
      this.artifact = null;
      if (this.returnToDashboard) {
        Pages.dashboard.init();
      } else {
        location.reload();
      }
    }
  };

  /* Tasks Page - for users with setup.json to fill artifacts */
  Pages.tasks = {
    init() {
      const main = document.getElementById('app-main');
      if (!main) return;

      main.innerHTML = `
        <div class="dashboard-hero">
          <h1 class="dashboard-hero__title">Fill Artifacts</h1>
          <p class="dashboard-hero__subtitle">Drop your artifact.json here to fill it out</p>

          <div class="dropzone" id="task-dropzone" onclick="document.getElementById('task-artifact-input').click()">
            <div class="dropzone__icon">📋</div>
            <div class="dropzone__title">Drop artifact.json here</div>
            <div class="dropzone__sub">or <a href="#" onclick="event.stopPropagation();document.getElementById('task-artifact-input').click()">browse for file</a></div>
            <input type="file" id="task-artifact-input" class="dropzone__input" accept=".json">
          </div>

          <div style="text-align:center;margin-top:32px">
            <button class="btn btn--ghost" onclick="Pages.tasks.goBack()">Back to dashboard</button>
          </div>
        </div>`;

      this._initDropzone();
    },

    _initDropzone() {
      const zone = document.getElementById('task-dropzone');
      const input = document.getElementById('task-artifact-input');
      if (!zone || !input) return;

      // Prevent global overlay from interfering
      zone.addEventListener('dragenter', e => {
        e.preventDefault();
        e.stopPropagation();
        e.stopImmediatePropagation();
      });

      zone.addEventListener('dragover', e => {
        e.preventDefault();
        e.stopPropagation();
        e.stopImmediatePropagation();
        zone.classList.add('dragover');
      });

      zone.addEventListener('dragleave', e => {
        e.stopPropagation();
        zone.classList.remove('dragover');
      });

      zone.addEventListener('drop', e => {
        e.preventDefault();
        e.stopPropagation();
        e.stopImmediatePropagation();
        zone.classList.remove('dragover');
        const file = e.dataTransfer?.files?.[0];
        if (file) this._handleFile(file);
      });

      input.addEventListener('change', e => {
        if (e.target.files?.[0]) this._handleFile(e.target.files[0]);
      });
    },

    async _handleFile(file) {
      if (!file || !file.name.endsWith('.json')) {
        Toast.show('Please select a .json file.', 'error');
        return;
      }
      try {
        const text = await Utils.readFile(file);
        const data = JSON.parse(text);

        // Validate it's an artifact
        if (!data.id || !data.name || !data.model) {
          Toast.show('Invalid artifact file. Missing required fields.', 'error');
          return;
        }

        // Initialize task filler with return to dashboard callback
        Pages.taskFiller.init(data);
        Pages.taskFiller.returnToDashboard = true;
      } catch {
        Toast.show('Could not parse artifact file. Check the file and try again.', 'error');
      }
    },

    goBack() {
      history.replaceState(null, '', 'index.html');
      Pages.dashboard.init();
    }
  };
  </script>
</body>
