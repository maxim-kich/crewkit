          const rateLabel = document.createElement('label');
          rateLabel.className = 'form-label';
          rateLabel.style.fontSize = '.7rem';
          rateLabel.textContent = 'Rate points';
          const rateInput = document.createElement('input');
          rateInput.type = 'number';
          rateInput.className = 'form-input q-field-row__rate-input';
          rateInput.style.cssText = 'width:100%;padding:6px 8px;font-size:.85rem;';
          rateInput.min = '2';
          rateInput.max = '10';
          rateInput.value = rateMax;
          rateInput.addEventListener('change', e => {
            QB.onRateMax(idx, e.target.value);
          });
          rateDiv.appendChild(rateLabel);
          rateDiv.appendChild(rateInput);
          row.appendChild(rateDiv);
        }

        // Control buttons
        const ctrlDiv = document.createElement('div');
        ctrlDiv.style.cssText = 'display:flex;gap:4px;flex-shrink:0;';

        const upBtn = document.createElement('button');
        upBtn.className = 'q-field-row__btn';
        upBtn.textContent = '⬆️';
        upBtn.title = 'Move up';
        upBtn.type = 'button';
        upBtn.disabled = idx === 0;
        upBtn.addEventListener('click', () => QB.moveFieldUp(idx));
        ctrlDiv.appendChild(upBtn);

        const downBtn = document.createElement('button');
        downBtn.className = 'q-field-row__btn';
        downBtn.textContent = '⬇️';
        downBtn.title = 'Move down';
        downBtn.type = 'button';
        downBtn.disabled = idx === fields.length - 1;
        downBtn.addEventListener('click', () => QB.moveFieldDown(idx));
        ctrlDiv.appendChild(downBtn);

        const delBtn = document.createElement('button');
        delBtn.className = 'q-field-row__btn q-field-row__btn--danger';
        delBtn.textContent = '🗑';
        delBtn.title = 'Delete field';
        delBtn.type = 'button';
        delBtn.addEventListener('click', () => QB.removeField(idx));
        ctrlDiv.appendChild(delBtn);

        row.appendChild(ctrlDiv);

        // Pills container (below all inputs, after buttons)
        if (showOptions && options.length > 0) {
          const pillsContainer = document.createElement('div');
          pillsContainer.style.cssText = 'flex-basis:100%;display:flex;flex-wrap:wrap;gap:6px;padding-top:6px;border-top:1px solid var(--color-border);margin-top:6px;';

          options.forEach((opt, optIdx) => {
            const pill = document.createElement('div');
            pill.className = 'q-option-pill';
            pill.innerHTML = `<span>${Utils.esc(opt)}</span><button type="button" class="q-option-pill-remove" onclick="QB.removeFieldOption(${idx}, ${optIdx})" title="Remove option">✕</button>`;
            pillsContainer.appendChild(pill);
          });

          row.appendChild(pillsContainer);
        }

        container.appendChild(row);
      });
    },

    /* ── Save ─────────────────────────────────────────────────────────────── */
    save() {
      const name = document.getElementById('q-name-input').value.trim();
      if (!name) {
        Toast.show('Questionnaire name is required.', 'error');
        document.getElementById('q-name-input').focus();
        return;
      }

      FB.fw.name = name;
      FB.fw.description = document.getElementById('q-desc-input').value.trim();
      FB.fw.updatedAt = new Date().toISOString();

      const artifacts = App.setup.artifacts || [];
      const idx = artifacts.findIndex(f => f.id === FB.fw.id);
      if (idx >= 0) {
        artifacts[idx] = FB.fw;
      } else {
        FB.fw.createdAt = new Date().toISOString();
        artifacts.push(FB.fw);
      }
      App.setup.artifacts = artifacts;

      if (!ModuleBase.safeSave(App.setup)) return;
      Toast.show('✅ Questionnaire saved.', 'success');
      setTimeout(() => { window.location.href = `artifact-builder.html?id=${FB.fw.id}&view=1&from=artifacts`; }, 600);
    }
  };

  Pages['artifact-builder'] = {
    init() {
      const raw = App.loadFromStorage();
      if (!raw) { window.location.href = 'index.html'; return; }
      App.setup = raw;
      App._applyTheme();
      App._renderHeader();
      App._renderFooter();
      FB.init();
    }
  };
  </script>
</body>
</html>
